<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ГСМ Калькулятор</title>
  <style>
    :root {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #e6e6e6;
      --accent: #8a4dff; /* Фиолетовый акцент */
      --accent-glow: rgba(138, 77, 255, 0.25);
      --danger: #ff5252;
      --input-bg: #2a2a2a;
      --border: #333;
      --muted: #999;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif;
      margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    h1 { font-size: 1.4rem; margin: 0 0 16px; text-align: center; font-weight: 600; color: #fff; }
    .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
    .btn-group { display: flex; gap: 6px; background: var(--card); padding: 4px; border-radius: 10px; }
    .btn {
      flex: 1; padding: 10px; background: transparent; border: none; color: var(--text);
      border-radius: 8px; cursor: pointer; font-size: 0.9rem; min-height: 48px; transition: 0.2s; font-weight: 500;
    }
    .btn:hover { background: #282828; }
    .btn.active { background: var(--accent); color: #fff; font-weight: 600; box-shadow: 0 2px 8px var(--accent-glow); }
    
    .info { 
      text-align: center; font-size: 0.75rem; color: var(--muted); background: var(--card); 
      padding: 8px; border-radius: 8px; margin-top: -4px; border: 1px solid var(--border);
    }
    h2 { font-size: 1rem; margin: 8px 0 4px; padding-left: 2px; color: #fff; font-weight: 500; opacity: 0.9; }
    
    input {
      width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border);
      color: #fff; border-radius: 8px; font-size: 1rem; min-height: 48px; transition: 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input:disabled { opacity: 0.4; cursor: not-allowed; background: #1a1a1a; }
    .row { display: flex; gap: 10px; } .row > div { flex: 1; }
    
    .hint { font-size: 0.75rem; color: var(--accent); text-align: center; margin: 4px 0; min-height: 18px; }
    
    .results {
      background: var(--card); border-radius: 12px; padding: 14px; margin-top: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35); border: 1px solid var(--border);
    }
    .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .res-row:last-child { border-bottom: none; }
    .res-row.total { margin-top: 6px; padding-top: 10px; border-top: 1px dashed var(--border); font-weight: 600; color: #fff; }
    .res-row.negative { color: var(--danger); font-weight: bold; }
    
    .footer { margin-top: 16px; font-size: 0.7rem; color: var(--muted); text-align: center; opacity: 0.6; }
  </style>
</head>
<body>
  <h1>⛽ ГСМ Калькулятор</h1>
  <div class="container">
    <label>Автомобиль</label>
    <div class="btn-group" id="car-selector">
      <button class="btn active" data-car="181">КМУ 181</button>
      <button class="btn" data-car="599">АГП 599</button>
      <button class="btn" data-car="750">АГП 750</button>
      <button class="btn" data-car="883">ГАЗ 883</button>
    </div>
    <div class="info" id="info-badge">М/Ч: 5 л/ч • Х.Х: 2,44 л/ч</div>
    
    <label>Сезон</label>
    <div class="btn-group" id="season-selector">
      <button class="btn active" data-season="summer">☀️ Лето</button>
      <button class="btn" data-season="winter">❄️ Зима</button>
    </div>
    
    <h2>Путевой лист</h2>
    <div class="row"><div><label>Дата</label><input type="text" id="date" readonly></div></div>
    <div class="row">
      <div><label>Одометр: выезд</label><input type="number" id="od-start" inputmode="decimal" step="0.1" placeholder="0"></div>
      <div><label>Одометр: заезд</label><input type="number" id="od-end" inputmode="decimal" step="0.1" placeholder="0"></div>
    </div>
    <div class="row">
      <div><label>Остаток: начало (л)</label><input type="number" id="fuel-start" inputmode="decimal" step="0.1" placeholder="0"></div>
      <div><label>Выдано (л)</label><input type="number" id="fuel-issued" inputmode="decimal" step="0.1" placeholder="0"></div>
    </div>
    <div class="row">
      <div><label>Моточасы (ч)</label><input type="number" id="moto-hours" inputmode="decimal" step="0.1" placeholder="0"></div>
      <div><label>Холостой ход (ч)</label><input type="number" id="idle-hours" inputmode="decimal" step="0.1" placeholder="0"></div>
    </div>
    <!-- Чекбоксы Груз/Город удалены по вашему запросу -->
    <div class="hint" id="hint-text">Для ГАЗ 883 моточасы не учитываются</div>
    
    <h2>📊 Расчёт</h2>
    <div class="results">
      <div class="res-row"><span>Пробег</span><span id="res-dist">0,0 км</span></div>
      <div class="res-row"><span>Норма</span><span id="res-norm">0,00 л/100км</span></div>
      <div class="res-row"><span>На пробег</span><span id="res-dist-fuel">0,0 л</span></div>
      <div class="res-row"><span>На моточасы</span><span id="res-moto-fuel">0,0 л</span></div>
      <div class="res-row"><span>На холостой ход</span><span id="res-idle-fuel">0,0 л</span></div>
      <div class="res-row total"><span>🔥 Всего расход</span><span id="res-total">0,0 л</span></div>
      <div class="res-row" id="remain-row"><span>💰 Остаток при заезде</span><span id="res-remain">0,0 л</span></div>
    </div>
  </div>
  <div class="footer">Все расчёты выполняются локально • Данные не сохраняются</div>

  <script>
    // ТОЧНЫЕ НОРМЫ ИЗ ВАШЕГО XLSX
    const RATES = {
      181: { summer: { base: 34.30, moto: 5.00, idle: 2.440 }, winter: { base: 39.10, moto: 5.00, idle: 2.744 } },
      599: { summer: { base: 29.10, moto: 6.00, idle: 2.380 }, winter: { base: 33.17, moto: 6.00, idle: 2.328 } },
      750: { summer: { base: 43.20, moto: 6.00, idle: 3.200 }, winter: { base: 48.80, moto: 6.00, idle: 3.200 } },
      883: { summer: { base: 14.51, moto: 0.00, idle: 1.000 }, winter: { base: 17.08, moto: 0.00, idle: 1.000 } }
    };

    let car = '181', season = 'summer';
    const $ = id => document.getElementById(id);

    // Инициализация
    $('date').value = new Date().toLocaleDateString('ru-RU');
    updateUI(); calc();

    // Слушатели кнопок
    document.querySelectorAll('#car-selector .btn').forEach(b => b.onclick = () => {
      document.querySelectorAll('#car-selector .btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); car = b.dataset.car; updateUI(); calc();
    });
    document.querySelectorAll('#season-selector .btn').forEach(b => b.onclick = () => {
      document.querySelectorAll('#season-selector .btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); season = b.dataset.season; calc();
    });

    // Слушатели полей ввода (реальный расчёт)
    ['od-start','od-end','fuel-start','fuel-issued','moto-hours','idle-hours'].forEach(id => {
      $(id).oninput = calc;
    });

    function updateUI() {
      const isGaz = car === '883';
      // ✅ Моточасы блокируются только для 883
      $('moto-hours').disabled = isGaz;
      // ✅ Холостой ход ВКЛЮЧЕН для всех авто (включая 883)
      $('idle-hours').disabled = false;
      
      if(isGaz) {
        $('moto-hours').value = '';
        $('hint-text').textContent = 'Для ГАЗ 883 моточасы не учитываются. Надбавки уже в норме.';
        $('info-badge').textContent = `М/Ч: не учит. • Х.Х: ${RATES[car][season].idle.toLocaleString('ru-RU')} л/ч`;
      } else {
        $('hint-text').textContent = '';
        $('info-badge').textContent = `М/Ч: ${RATES[car][season].moto} л/ч • Х.Х: ${RATES[car][season].idle.toLocaleString('ru-RU')} л/ч`;
      }
    }

    function parse(v) {
      const n = parseFloat(String(v).replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function fmt(n, d=1) { return n.toLocaleString('ru-RU', {minimumFractionDigits:d, maximumFractionDigits:d}); }

    function calc() {
      const r = RATES[car][season];
      let moto = parse($('moto-hours').value);
      let idle = parse($('idle-hours').value);
      if(car === '883') moto = 0; // Гарантируем 0 для 883

      const dist = Math.max(0, parse($('od-end').value) - parse($('od-start').value));
      const norm = r.base; // Чекбоксы убраны, надбавки уже учтены в базовой норме

      const fDist = (dist / 100) * norm;
      const fMoto = moto * r.moto;
      const fIdle = idle * r.idle; // ✅ Корректно считается для всех, включая 883
      const total = fDist + fMoto + fIdle;

      const rawRem = (parse($('fuel-start').value) + parse($('fuel-issued').value)) - total;
      // Округление по ТЗ: >= 0.5 -> ceil, иначе -> floor
      const rem = (rawRem - Math.floor(rawRem) >= 0.5) ? Math.ceil(rawRem) : Math.floor(rawRem);

      $('res-dist').textContent = fmt(dist) + ' км';
      $('res-norm').textContent = fmt(norm, 2) + ' л/100км';
      $('res-dist-fuel').textContent = fmt(fDist) + ' л';
      $('res-moto-fuel').textContent = fmt(fMoto) + ' л';
      $('res-idle-fuel').textContent = fmt(fIdle) + ' л';
      $('res-total').textContent = fmt(total) + ' л';
      $('res-remain').textContent = rem + ' л';
      
      $('remain-row').classList.toggle('negative', rawRem < 0);
      updateUI(); // Обновляем инфо-бейдж при смене сезона
    }
  </script>
</body>
</html>
